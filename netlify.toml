# Netlify Configuration for Prepixo (React + Vite App)

[build]
  # Build command
  command = "cd frontend && npm install && npm run build"
  
  # Directory to publish (Vite builds to 'dist' by default)
  publish = "frontend/dist"
  
  # Base directory (important for monorepo structure)
  base = "/"

[build.environment]
  # Use Node 18+ for Vite compatibility
  NODE_VERSION = "18"
  
  # Set production environment
  NODE_ENV = "production"

# Redirect rules for SPA (Single Page Application)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer-when-downgrade"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Environment variables (add these in Netlify UI)
# VITE_SUPABASE_URL
# VITE_SUPABASE_PUBLISHABLE_KEY
# VITE_RAZORPAY_KEY_ID
# VITE_RAZORPAY_KEY_SECRET
# REACT_APP_BACKEND_URL
